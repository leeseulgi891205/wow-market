<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원가입 | Wow Market</title>
    <link rel="stylesheet" href="/css/shop.css">
</head>
<body class="auth-page">
<main class="login-card">
    <a class="brand" href="/">WOW MARKET</a>
    <h1>회원가입</h1>
    <p>데모 버전에서는 브라우저에만 로그인 정보가 저장됩니다.</p>
    <form id="signup-form">
        <label>이름<input type="text" name="name" placeholder="홍길동" required></label>
        <label>이메일<input type="email" name="email" placeholder="you@example.com" required></label>
        <label>비밀번호<input type="password" name="password" placeholder="비밀번호" required></label>
        <button type="submit">가입하기</button>
    </form>
    <div class="auth-links">
        <a href="/login.html">로그인</a>
        <a href="/">쇼핑 계속하기</a>
    </div>
</main>
<script src="/js/app.js"></script>
<script>
document.getElementById("signup-form").addEventListener("submit", (event) => {
  event.preventDefault();
  const name = event.target.elements.name.value.trim();
  const email = event.target.elements.email.value.trim();
  if (!name || !email) return;
  setUser({ email, name });
  window.location.href = "/";
});
</script>
</body>
</html>
