<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>상품 상세 | Wow Market</title>
    <link rel="stylesheet" href="/css/shop.css">
</head>
<body>
<header class="nav">
    <a class="brand" href="/">WOW MARKET</a>
    <nav><a href="/">Shop</a><a href="/cart.html">Cart</a><a href="/orders.html">Orders</a></nav>
</header>
<main id="detail-root"></main>
<script src="/js/products.js"></script>
<script src="/js/app.js"></script>
<script>
const product = findProduct(queryParam("id"));
const root = document.getElementById("detail-root");

if (!product) {
  root.innerHTML = `<section class="detail"><div><h1>상품을 찾을 수 없습니다.</h1><a href="/">홈으로</a></div></section>`;
} else {
  document.title = `${product.name} | Wow Market`;
  root.innerHTML = `
    <section class="detail">
      <img src="${product.imageUrl}" alt="${product.name}">
      <div>
        <p class="eyebrow">${product.category}</p>
        <h1>${product.name}</h1>
        <p>${product.description}</p>
        <strong>${formatPrice(product.price)}</strong>
        <p class="stock">남은 수량 ${product.stockQuantity}개</p>
        <div class="buy-box">
          <input type="number" id="quantity" value="1" min="1" max="9">
          <button type="button" id="add-cart">장바구니 담기</button>
        </div>
      </div>
    </section>
  `;
  document.getElementById("add-cart").addEventListener("click", () => {
    addToCart(product.id, Number(document.getElementById("quantity").value || 1));
    window.location.href = "/cart.html";
  });
}
</script>
</body>
</html>
