<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인 | Wow Market</title>
    <link rel="stylesheet" href="/css/shop.css">
</head>
<body class="auth-page">
<main class="login-card">
    <a class="brand" href="/">WOW MARKET</a>
    <h1>로그인</h1>
    <p>회원 전용 장바구니와 주문 내역을 이용해보세요.</p>
    <form id="login-form">
        <label>이메일<input type="email" name="email" placeholder="you@example.com" required></label>
        <label>비밀번호<input type="password" name="password" placeholder="비밀번호" required></label>
        <p class="error" id="error" hidden>이메일 또는 비밀번호가 맞지 않습니다.</p>
        <button type="submit">로그인</button>
    </form>
    <div class="auth-links">
        <a href="/signup.html">회원가입</a>
        <a href="/">쇼핑 계속하기</a>
    </div>
</main>
<script src="/js/app.js"></script>
<script>
document.getElementById("login-form").addEventListener("submit", (event) => {
  event.preventDefault();
  const email = event.target.elements.email.value.trim();
  const password = event.target.elements.password.value.trim();
  if (!email || !password) return;
  setUser({ email, name: email.split("@")[0] });
  window.location.href = "/";
});
</script>
</body>
</html>
