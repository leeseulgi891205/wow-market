spring:
  application:
    name: wow-shop
  datasource:
    url: jdbc:h2:mem:wowshop;MODE=MySQL;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false

server:
  port: 8181

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.5-flash
