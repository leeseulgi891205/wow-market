<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cart</title>
    <link rel="stylesheet" href="/css/shop.css">
</head>
<body>
<header class="nav">
    <a class="brand" href="/">WOW SHOP</a>
    <nav><a href="/">Shop</a><a href="/orders">Orders</a></nav>
</header>
<main>
    <section class="section-head">
        <div>
            <p class="eyebrow">Your bag</p>
            <h2>장바구니</h2>
        </div>
    </section>
    <section class="cart-layout">
        <div class="cart-list">
            <article class="cart-row" th:each="item : ${items}">
                <img th:src="${item.product.imageUrl}" th:alt="${item.product.name}">
                <div>
                    <h3 th:text="${item.product.name}">Product</h3>
                    <p th:text="${item.quantity} + '개'">1개</p>
                </div>
                <strong th:text="${#numbers.formatInteger(item.product.price * item.quantity, 3, 'COMMA')} + '원'">0원</strong>
                <form method="post" th:action="@{/cart/items/{id}/delete(id=${item.id})}">
                    <button type="submit">삭제</button>
                </form>
            </article>
            <p class="empty" th:if="${#lists.isEmpty(items)}">아직 담긴 상품이 없습니다.</p>
        </div>
        <aside class="summary">
            <span>Total</span>
            <strong th:text="${#numbers.formatInteger(total, 3, 'COMMA')} + '원'">0원</strong>
            <form method="post" th:action="@{/orders}">
                <button type="submit" th:disabled="${#lists.isEmpty(items)}">결제하기</button>
            </form>
        </aside>
    </section>
</main>
</body>
</html>
