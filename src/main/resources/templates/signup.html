<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원가입 | Wow Market</title>
    <link rel="stylesheet" href="/css/shop.css">
</head>
<body class="auth-page">
<main class="signup-shell">
    <section class="signup-copy">
        <a class="brand" href="/">WOW MARKET</a>
        <h1>실제 쇼핑몰처럼 가입하고 바로 구매하세요.</h1>
        <p>이메일 로그인, 배송지, 약관 동의까지 면접관이 흐름을 확인할 수 있게 구성했습니다.</p>
        <div class="trust-list">
            <span>BCrypt 비밀번호 암호화</span>
            <span>Spring Security 세션 로그인</span>
            <span>장바구니와 주문 연동</span>
        </div>
    </section>

    <section class="signup-card">
        <h2>회원가입</h2>
        <form method="post" th:action="@{/signup}" th:object="${signupRequest}">
            <div class="field-grid">
                <label>이름<input type="text" th:field="*{name}" placeholder="홍길동"></label>
                <label>휴대폰<input type="tel" th:field="*{phone}" placeholder="010-1234-5678"></label>
            </div>
            <label>이메일<input type="email" th:field="*{email}" placeholder="you@example.com"></label>
            <label>비밀번호<input type="password" th:field="*{password}" placeholder="8자 이상 입력"></label>
            <div class="field-grid">
                <label>우편번호<input type="text" th:field="*{zipcode}" placeholder="06236"></label>
                <label>기본 배송지<input type="text" th:field="*{address}" placeholder="서울시 강남구 테헤란로"></label>
            </div>
            <div class="agree-box">
                <label><input type="checkbox" th:field="*{termsAgreed}"> 이용약관과 개인정보 처리방침에 동의합니다.</label>
                <label><input type="checkbox" th:field="*{marketingAgreed}"> 할인 쿠폰과 이벤트 알림을 받겠습니다.</label>
            </div>
            <div class="error" th:if="${#fields.hasAnyErrors()}" th:errors="*{all}">입력값을 확인해주세요.</div>
            <button type="submit">회원가입 완료</button>
        </form>
        <a class="sub-link" href="/login">이미 계정이 있나요? 로그인</a>
    </section>
</main>
</body>
</html>
